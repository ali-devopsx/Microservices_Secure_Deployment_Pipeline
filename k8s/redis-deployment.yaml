# =====================================================================
# Service: gives a fixed address so other pods can find Redis

---
# =====================================================================
# API version for basic Kubernetes objects
apiVersion: v1
# Type of resource: Service creates a stable network address
kind: Service
# Information about this Service
metadata:
  # Name that Django and Celery use to connect to Redis
  name: redis-service
  # Put this Service in the production namespace
  namespace: cyber-prod-env
# How this Service works
spec:
  # Find pods with label "app: redis" and send traffic to them
  selector:
    app: redis
  # List of ports this Service listens on
  ports:
    # Redis default port number
    - port: 6379
  # ClusterIP: this Service is only reachable inside the cluster
  type: ClusterIP

---
# =====================================================================
# Deployment: keeps the Redis pod running

---
# =====================================================================
# API version for managing applications (apps/v1)
apiVersion: apps/v1
# Type of resource: Deployment makes sure a pod stays running
kind: Deployment
# Information about this Deployment
metadata:
  # Name of this Deployment
  name: redis-deployment
  # Put it in the production namespace
  namespace: cyber-prod-env
# How this Deployment should behave
spec:
  # Run exactly 1 copy of the pod
  replicas: 1
  # Which pods this Deployment is responsible for
  selector:
    matchLabels:
      app: redis
  # Blueprint for creating new pods
  template:
    # Labels for the pod
    metadata:
      labels:
        app: redis
    # Pod specification
    spec:
      # List of containers in this pod
      containers:
        # Name of this container
        - name: redis
          # Use the official Redis image version 7 on Alpine Linux
          image: redis:7-alpine
          # Command to run: start Redis with a password from environment variable
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          # Environment variables for the container
          env:
            # Variable name: REDIS_PASSWORD holds the Redis password
            - name: REDIS_PASSWORD
              # Get the value from a Kubernetes Secret
              valueFrom:
                # Reference to a Secret object
                secretKeyRef:
                  # Name of the Secret
                  name: cyber-app-secrets
                  # Key inside that Secret
                  key: redis-password
          # Ports that this container opens
          ports:
            # Redis listens on port 6379
            - containerPort: 6379

