# =====================================================================
# Service: lets Django and Celery find Redis by name

---
# API version
apiVersion: v1
# Service = stable network endpoint
kind: Service
# Info
metadata:
  # Name used by Django/Celery to connect
  name: redis-service
  # Production namespace
  namespace: cyber-prod-env
# Service config
spec:
  # Route to pods with this label
  selector:
    app: redis
  # Ports
  ports:
    # Redis default port
    - port: 6379
  # Internal only
  type: ClusterIP

---
# =====================================================================
# Deployment: runs the Redis pod

---
# API version for apps
apiVersion: apps/v1
# Deployment = keeps pod running
kind: Deployment
# Info
metadata:
  # Name of this deployment
  name: redis-deployment
  # Production namespace
  namespace: cyber-prod-env
# Config
spec:
  # One replica
  replicas: 1
  # Manage pods with this label
  selector:
    matchLabels:
      app: redis
  # Pod template
  template:
    metadata:
      labels:
        app: redis
    spec:
      # Containers
      containers:
        - name: redis
          # Official redis image
          image: redis:7-alpine
          # Start with password auth
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          # Env vars
          env:
            # Redis password from secret
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: redis-password
          # Ports
          ports:
            - containerPort: 6379

          # Liveness probe: restart if unresponsive
          livenessProbe:
            exec:
              command:
                - "redis-cli"
                - "-a"
                - "$(REDIS_PASSWORD)"
                - "ping"
            initialDelaySeconds: 15
            periodSeconds: 10

          # Readiness probe: mark ready when Redis accepts commands
          readinessProbe:
            exec:
              command:
                - "redis-cli"
                - "-a"
                # BUG: should be REDIS_PASSWORD, not POSTGRES_PASSWORD
                - "$(POSTGRES_PASSWORD)"
                - "ping"
            initialDelaySeconds: 5
            periodSeconds: 5
