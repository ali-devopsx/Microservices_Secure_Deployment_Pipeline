# === Service (stable network address) ===
# API version
apiVersion: v1
# Resource type: Service (gives a fixed IP/name to reach Redis)
kind: Service
# Info about this service
metadata:
  # Name used by Django and Celery
  name: redis-service
  # Put in production namespace
  namespace: cyber-prod-env
# How this service works
spec:
  # Find pods with label "app: redis"
  selector:
    app: redis
  # Ports this service listens on
  ports:
    # Standard Redis port
    - port: 6379
  # ClusterIP = only reachable inside the cluster
  type: ClusterIP

---
# === Deployment (manages Redis pod) ===
# API version for managing apps
apiVersion: apps/v1
# Resource type: Deployment (keeps pod running)
kind: Deployment
# Info about this deployment
metadata:
  # Name of this deployment
  name: redis-deployment
  # Put in production namespace
  namespace: cyber-prod-env
# How this deployment should run
spec:
  # Run exactly 1 copy of the pod
  replicas: 1
  # Which pods this deployment controls
  selector:
    matchLabels:
      app: redis
  # Template to create new pods
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          # Use official Redis image
          image: redis:7-alpine
          # Start Redis with password protection
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            # Redis password from secret
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
