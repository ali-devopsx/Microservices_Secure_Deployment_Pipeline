# Version of the Kubernetes API for networking objects
apiVersion: networking.k8s.io/v1
# Empty line for readability
# Type of resource: Ingress opens a door for outside traffic to reach your app
kind: Ingress
# Empty line for readability
# Information about this Ingress resource
metadata:
  # The name we give to this Ingress
  name: cyber-app-ingress
  # Which namespace it belongs to
  namespace: cyber-prod-env
  # Extra settings (annotations) to control how Nginx handles traffic
  annotations:
    # Max size for file uploads: 10 megabytes
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
# Empty line for readability
# Main configuration for this Ingress
spec:
  # List of traffic rules
  rules:
    # Rule for a specific domain name
    - host: ali-devsecops.local
      # HTTP-specific settings for this host
      http:
        # List of URL path rules
        paths:
          # This rule matches all URLs starting with "/"
          - path: /
            # Prefix means "starts with this path"
            pathType: Prefix
            # Where to send matching traffic
            backend:
              # Points to a Service inside the cluster
              service:
                # Name of the Service
                name: django-service
                # Port number on that Service
                port:
                  # Django listens on port 8000
                  number: 8000
