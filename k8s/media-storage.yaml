# API version
apiVersion: v1
# PersistentVolumeClaim = ask for disk space
kind: PersistentVolumeClaim

# Info about this claim
metadata:
  # Name of this claim
  name: pvc-media
  # Namespace for production
  namespace: cyber-prod-env

# Storage requirements
spec:
  # One pod can write at a time (minikube is single node)
  accessModes:
    - ReadWriteOnce
  # How much space
  resources:
    requests:
      # 1 Gigabyte
      storage: 1Gi
