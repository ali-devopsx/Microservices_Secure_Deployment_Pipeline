# =====================================================================
# HorizontalPodAutoscaler: auto-scales Django pods by CPU
# NOTE: Not currently applied to the cluster
# =====================================================================
# API version for autoscaling
apiVersion: autoscaling/v2
# HPA = automatically adds or removes pods
kind: HorizontalPodAutoscaler
# Info
metadata:
  # Name
  name: django-hpa
  # Namespace
  namespace: cyber-prod-env
# Configuration
spec:
  # Which deployment to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: django-deployment
  # Minimum pods (never go below)
  minReplicas: 2
  # Maximum pods (never go above)
  maxReplicas: 5
  # What triggers scaling
  metrics:
    # Scale based on CPU
    - type: Resource
      resource:
        # Watch CPU usage
        name: cpu
        target:
          # Target type: % of requested CPU
          type: Utilization
          # Scale up if CPU goes above 60%
          averageUtilization: 60
