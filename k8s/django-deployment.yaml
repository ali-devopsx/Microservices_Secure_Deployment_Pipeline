# =====================================================================
# Service: gives a fixed address so Ingress can find Django

---
# =====================================================================
# API version for basic Kubernetes objects
apiVersion: v1
# Type of resource: Service creates a stable network address
kind: Service
# Information about this Service
metadata:
  # Name that the Ingress uses to reach Django
  name: django-service
  # Put this Service in the production namespace
  namespace: cyber-prod-env
# How this Service works
spec:
  # Find pods with label "app: django-web" and send traffic to them
  selector:
    app: django-web
  # List of ports this Service listens on
  ports:
    # Django web server port
    - port: 8000
  # ClusterIP: this Service is only reachable inside the cluster
  type: ClusterIP
---

---
# =====================================================================
# Deployment: keeps the Django web pods running

---
# =====================================================================
# API version for managing applications
apiVersion: apps/v1
# Type of resource: Deployment makes sure pods stay running
kind: Deployment
# Information about this Deployment
metadata:
  # Name of this Deployment
  name: django-deployment
  # Put it in the production namespace
  namespace: cyber-prod-env
# How this Deployment should behave
spec:
  # Run 2 copies of the pod for high availability
  replicas: 2
  # Which pods this Deployment is responsible for
  selector:
    matchLabels:
      app: django-web
  # Blueprint for creating new pods
  template:
    # Labels for the pod
    metadata:
      labels:
        app: django-web
    # Pod specification
    spec:
      # List of containers in this pod
      containers:
        # Name of this container
        - name: django
          # Use your custom Django image built locally
          image: django-secure-app:latest
          # Never pull from Docker Hub, use the local image
          imagePullPolicy: Never
          # Environment variables for Django
          env:
            # Database name for Django to connect
            - name: DB_NAME
              # Get value from the Secret
              valueFrom:
                secretKeyRef:
                  # Name of the Secret object
                  name: cyber-app-secrets
                  # Key inside the Secret
                  key: db-name
            # Database username
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: db-user
            # Database password
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: db-password


            # Environment variable name for database host
            - name: DB_HOST
              # Reference source for the value
              valueFrom:
                # Read from a ConfigMap resource
                configMapKeyRef:
                  # Name of the target ConfigMap
                  name: cyber-app-config
                  # Key inside the ConfigMap to extract
                  key: DB_HOST
            # Environment variable name for database port
            - name: DB_PORT
              # Reference source for the value
              valueFrom:
                # Read from a ConfigMap resource
                configMapKeyRef:
                  # Name of the target ConfigMap
                  name: cyber-app-config
                  # Key inside the ConfigMap to extract
                  key: DB_PORT
            # Environment variable name for Redis host
            - name: REDIS_HOST
              # Reference source for the value
              valueFrom:
                # Read from a ConfigMap resource
                configMapKeyRef:
                  # Name of the target ConfigMap
                  name: cyber-app-config
                  # Key inside the ConfigMap to extract
                  key: REDIS_HOST
            # Environment variable name for Redis port
            - name: REDIS_PORT
              # Reference source for the value
              valueFrom:
                # Read from a ConfigMap resource
                configMapKeyRef:
                  # Name of the target ConfigMap
                  name: cyber-app-config
                  # Key inside the ConfigMap to extract
                  key: REDIS_PORT
            # Environment variable name for Django debug
            - name: DEBUG
              # Reference source for the value
              valueFrom:
                # Read from a ConfigMap resource
                configMapKeyRef:
                  # Name of the target ConfigMap
                  name: cyber-app-config
                  # Key inside the ConfigMap to extract
                  key: DJANGO_DEBUG
            # Environment variable name for allowed hosts
            - name: DJANGO_ALLOWED_HOSTS
              # Reference source for the value
              valueFrom:
                # Read from a ConfigMap resource
                configMapKeyRef:
                  # Name of the target ConfigMap
                  name: cyber-app-config
                  # Key inside the ConfigMap to extract
                  key: DJANGO_ALLOWED_HOSTS

           # Allowed hosts: security setting, only these domains can connect
#            - name: DJANGO_ALLOWED_HOSTS
              # Comma-separated list of allowed domains
#              value: "localhost,127.0.0.1,ali-devsecops-app,ali-devsecops.local"
            # Database host: use the Service name of Postgres
#            - name: DB_HOST
#              value: "postgres-service"
            # Database port: Postgres default
#            - name: DB_PORT
#              value: "5432"
            # Redis host: use the Service name of Redis
#            - name: REDIS_HOST
#              value: "redis-service"
            # Redis port: Redis default
#            - name: REDIS_PORT
#              value: "6379"
            # Redis password for authentication
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: redis-password
          # Ports that this container opens
          ports:
            # Django runs on port 8000
            - containerPort: 8000
          # Automated check to see if the container is still alive
          livenessProbe:
            httpGet:
              path: /          # Check the homepage url
              port: 8000       # On Django internal port
              # Custom request headers configuration
              httpHeaders:
                # HTTP header name attribute
                - name: Host
                  # Virtual host domain mapping string
                  value: "ali-devsecops.local"
            initialDelaySeconds: 20  # Wait 20 seconds after launch before checking
            periodSeconds: 10        # Re-check every 10 seconds


          # Automated check to see if Django is fully ready to take users
          readinessProbe:
            httpGet:
              path: /       # Test hitting the application directly
              port: 8000
              # Custom request headers configuration
              httpHeaders:
                - name: Host
                  value: "ali-devsecops.local"

            initialDelaySeconds: 15  # Start checking after 15 seconds
            periodSeconds: 5         # Check very fast every 5 seconds


          # Resource limits to prevent the pod from using too much memory/CPU
          resources:
            # Minimum guaranteed resources
            requests:
              memory: 128Mi
              cpu: 100m
            # Maximum allowed resources
            limits:
              memory: 256Mi
              cpu: 200m
          # Mount shared storage for uploaded files
          volumeMounts:
            # Use the volume named "media-storage"
            - name: media-storage
              # Mount it at the /app/media path in the container
              mountPath: /app/media
      # Volumes available to all containers in this pod
      volumes:
        # Volume named "media-storage" for shared media files
        - name: media-storage
          # This volume uses a PersistentVolumeClaim
          persistentVolumeClaim:
            # Name of the PVC we created for media
            claimName: pvc-media

---
# =====================================================================
# Deployment: keeps the Celery worker pod running

---
# =====================================================================
# API version for managing applications
apiVersion: apps/v1
# Type of resource: Deployment makes sure pods stay running
kind: Deployment
# Information about this Deployment
metadata:
  # Name of this Deployment
  name: celery-deployment
  # Put it in the production namespace
  namespace: cyber-prod-env
# How this Deployment should behave
spec:
  # Run 1 copy of the Celery worker pod
  replicas: 1
  # Which pods this Deployment is responsible for
  selector:
    matchLabels:
      app: celery-worker
  # Blueprint for creating new pods
  template:
    # Labels for the pod
    metadata:
      labels:
        app: celery-worker
    # Pod specification
    spec:
      # List of containers in this pod
      containers:
        # Name of this container
        - name: celery
          # Use the same Django image but run a different command
          image: django-secure-app:latest
          # Use local image, do not pull from Docker Hub
          imagePullPolicy: Never
          # Override the default command: start Celery worker instead of Django
          command: ["/usr/local/bin/celery", "-A", "cyber_portfolio", "worker", "--loglevel=info"]
          # Environment variables (same as Django web)
          env:
            # Database name
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: db-name
            # Database username
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: db-user
            # Database password
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: db-password
            # Database host: use the Postgres Service name
            - name: DB_HOST
              value: "postgres-service"
            # Database port
            - name: DB_PORT
              value: "5432"
            # Redis host: use the Redis Service name
            - name: REDIS_HOST
              value: "redis-service"
            # Redis port
            - name: REDIS_PORT
              value: "6379"
            # Redis password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cyber-app-secrets
                  key: redis-password

