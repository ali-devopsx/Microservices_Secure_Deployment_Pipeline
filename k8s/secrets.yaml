# API version
apiVersion: v1
# Secret = stores sensitive data like passwords
kind: Secret

# Info about this secret
metadata:
  # Name for this secret object
  name: cyber-app-secrets
  # Which namespace it lives in
  namespace: cyber-prod-env

# Opaque = generic key-value type for secrets
type: Opaque

# Base64 encoded values (not encrypted, just encoded)
data:
  # Database name: cyber_db in base64
  db-name: Y3liZXJfZGI=
  # Old user kept as reference (commented out)
#  db-user: YWxp
  # Database user: cyber_user
  db-user: Y3liZXJfdXNlcg==
  # Database password: supersecure_pass123
  db-password: c3VwZXJzZWN1cmVfcGFzczEyMw==
  # Redis password: super_secure_redis_pass_2026
  redis-password: c3VwZXJfc2VjdXJlX3JlZGlzX3Bhc3NfMjAyNg==
