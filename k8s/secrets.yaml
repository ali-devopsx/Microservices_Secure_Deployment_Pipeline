# API version
apiVersion: v1
# Resource type: Secret (stores private data like passwords)
kind: Secret

# Info about this secret
metadata:
  # Name of this secret
  name: cyber-app-secrets
  # Put this secret in the production namespace
  namespace: cyber-prod-env

# Type: Opaque means general key-value secrets
type: Opaque

# Encrypted values (encoded in Base64 format)
data:
  # Database name (real value: cyber_db)
  db-name: Y3liZXJfZGI=
  # Database username (real value: ali)
  db-user: YWxp
  # Database password (real value: supersecure_pass123)
  db-password: c3VwZXJzZWN1cmVfcGFzczEyMw==
  # Redis password (real value: super_secure_redis_pass_2026)
  redis-password: c3VwZXJfc2VjdXJlX3JlZGlzX3Bhc3NfMjAyNg==
