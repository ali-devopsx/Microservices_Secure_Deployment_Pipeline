name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  IMAGE_NAME: cyber-portfolio

jobs:
  security-scan:                 # Bandit Scan Project vulnerabilities
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install bandit

      - name: Run Bandit scan   # Scan Code in app/
        run: |
          bandit -r app/ -x app/venv,app/env,app/tests --severity-level high

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build web image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:web-${{ github.sha }} -f Dockerfile .

      - name: Build celery image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:celery-${{ github.sha }} -f Dockerfile .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Tag & Push web image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:web-${{ github.sha }} ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:web-latest
          docker tag ${{ env.IMAGE_NAME }}:web-${{ github.sha }} ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:web-${{ github.sha }}
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:web-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:web-${{ github.sha }}

      - name: Tag & Push celery image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:celery-${{ github.sha }} ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:celery-latest
          docker tag ${{ env.IMAGE_NAME }}:celery-${{ github.sha }} ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:celery-${{ github.sha }}
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:celery-latest
          docker push ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:celery-${{ github.sha }}
