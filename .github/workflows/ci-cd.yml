# =========================
# CI/CD PIPELINE
# =========================
name: CI/CD Pipeline

# Trigger on push or PR to main branch
on:
  push:
    branches: [main]      # Run when code pushed to main
  pull_request:
    branches: [main]      # Run on pull request to main

# Global environment variables shared across jobs
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}  # Docker Hub username (from GitHub Secrets)
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}  # Docker Hub password (from GitHub Secrets)
  IMAGE_NAME: cyber-portfolio                      # Docker image name
  DJANGO_SECRET_KEY: ci-test-key                   # Django key for testing only

# =========================
# JOBS
# =========================
jobs:

  # =========================
  # 1. SECURITY SCAN (CODE)
  # =========================
  security-scan:
    name: Security Scan (Bandit)   # Scan source code for vulnerabilities
    runs-on: ubuntu-latest         # Use Ubuntu runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Download repo code to runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit         # Install security scanner

      - name: Run Bandit scan
        run: bandit -r app/ -x app/venv,app/env,app/tests --severity-level high


  # =========================
  # 2. TESTS (WITH DATABASE)
  # =========================
  tests:
    name: Run Tests                   # Run Django unit tests
    runs-on: ubuntu-latest
    needs: security-scan              # Run only after security scan passes

    # Spin up PostgreSQL container as a service
    services:
      postgres:
        image: postgres:15-alpine          # Same PostgreSQL version as production
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: app             # requirements.txt is inside app/
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: app             # manage.py is inside app/
        env:
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_HOST: localhost
          DB_PORT: 5432
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost
        run: python manage.py test


  # =========================
  # 3. BUILD + SCAN + PUSH
  # =========================
  build-and-push:
    name: Build, Scan & Push Image     # Build, security scan, then push to Docker Hub
    runs-on: ubuntu-latest
    needs: tests                       # Run only after tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy scan on pushed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
