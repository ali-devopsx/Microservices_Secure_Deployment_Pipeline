# Virtual wire connections for security
networks:
  # Public wire for internet users
  frontend_net:
    # Use normal network system
    driver: bridge
  # Private wire hidden from internet
  backend_net:
    # Use normal network system
    driver: bridge
    # Block outside internet access
    internal: true

# Hard drives to save data
volumes:
  # Drive for database rows
  postgres_data:
  # Drive for website styles
  static_volume:
  # Drive for cache storage
  redis_data:

# Apps running inside containers
services:

  # SQL Database storage layer
  db:
    # Official alpine image name
    image: postgres:15-alpine
    # Custom database container name
    container_name: cyber_postgres_db
    # Restart if it crashes
    restart: unless-stopped
    # Database keys and passwords
    environment:
      # Name of database created
      POSTGRES_DB: ${DB_NAME}
      # Admin login username variable
      POSTGRES_USER: ${DB_USER}
      # Admin login password variable
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Bind persistent hard drive
    volumes:
      # Local drive to container
      - postgres_data:/var/lib/postgresql/data
    # Connect to virtual wires
    networks:
      # Use hidden private wire
      - backend_net
    # Open inside docker network
    expose:
      # Port for database connection
      - "5432"
    # Automation check for readiness
    healthcheck:
      # Command to test postgres
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      # Run check every 10s
      interval: 10s
      # Fail if takes 5s
      timeout: 5s
      # Try 5 times maximum
      retries: 5

  # Django Web Server app
  web:
    # Build instructions for image
    build:
      # Active current directory path
      context: .
      # Use secure customized file
      dockerfile: Dockerfile
    # Custom web app name
    container_name: ali-devsecops-app
    # Restart if it crashes
    restart: unless-stopped
    # Inject active setup values
    environment:
      # Link postgres database name
      - DB_NAME=${DB_NAME}
      # Link postgres database user
      - DB_USER=${DB_USER}
      # Link postgres database password
      - DB_PASSWORD=${DB_PASSWORD}
      # Link postgres network host
      - DB_HOST=${DB_HOST}
      # Link postgres network port
      - DB_PORT=${DB_PORT}
      # Link django security key
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      # Disable debug on production
      - DEBUG=${DJANGO_DEBUG}
      # Link redis cache host
      - REDIS_HOST=${REDIS_HOST}
      # Link redis cache port
      - REDIS_PORT=${REDIS_PORT}
      # Link redis cache password
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    # Bind shared files folder
    volumes:
      # Share folder for CSS/JS
      - static_volume:/app/staticfiles
    # Connect to virtual wires
    networks:
      # Use public internet wire
      - frontend_net
      # Use hidden private wire
      - backend_net
    # Containers needed before boot
    depends_on:
      # Name of database container
      db:
        # Wait until database healthy
        condition: service_healthy
      # Name of cache container
      redis:
        # Wait until cache healthy
        condition: service_healthy
    # Open inside docker network
    expose:
      # Port for web connection
      - "8000"

  # Nginx Reverse Proxy gate
  nginx:
    # Official stable alpine image
    image: nginx:1.25-alpine
    # Custom web gate name
    container_name: nginx_web_server
    # Restart if it crashes
    restart: unless-stopped
    # Public interfaces to outside
    ports:
      # Open port 80 globally
      - "80:80"
    # Mount files into container
    volumes:
      # Sync proxy routing rule
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Read shared style assets
      - static_volume:/app/staticfiles
    # Connect to virtual wires
    networks:
      # Use public internet wire
      - frontend_net
    # Containers needed before boot
    depends_on:
      # Wait for django container
      - web

  # Memory Cache storage service
  redis:
    # Official safe tiny image
    image: redis:7-alpine
    # Custom cache container name
    container_name: cyber_redis_cache
    # Restart if it crashes
    restart: unless-stopped
    # Add authentication startup parameters
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # Connect to virtual wires
    networks:
      # Use hidden private wire
      - backend_net
    # Open inside docker network
    expose:
      # Port for cache connection
      - "6379"
    # Automation check for readiness
    healthcheck:
      # Check with authentication ping
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      # Run check every 10s
      interval: 10s
      # Fail if takes 5s
      timeout: 5s
      # Try 5 times maximum
      retries: 5
